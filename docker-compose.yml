services:
  database:
    image: timescale/timescaledb:latest-pg16
    container_name: vitalwatch_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=vitalpass
      - POSTGRES_DB=vitalwatch
    ports:
      - "5432:5432"
    volumes:
      - ./Back-end_VitalWatch-develop/init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  app:
    build: ./Back-end_VitalWatch-develop
    container_name: vitalwatch_app
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://admin:vitalpass@database:5432/vitalwatch?schema=public
    env_file:
      - ./Back-end_VitalWatch-develop/.env
    depends_on:
      - database

  frontend:
    build: ./Front
    container_name: vitalwatch_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
